<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Produtos</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>

<body>
    <header class="topo">
        <h1>Catálogo de Produtos</h1>
        <p>Desenvolvimento Front-end no GitHub Pages e consumo de API em Express + SQLite no Render</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>Adicionar produto</h2>

            <form id="formProduto">
                <label>
                    Nome
                    <input id="name" type="text" required />
                </label>

                <label>
                    Descrição
                    <input id="description" type="text" />
                </label>

                <div class="grid2">
                    <label>
                        Preço
                        <input id="price" type="number" step="0.01" required />
                    </label>

                    <label>
                        Estoque
                        <input id="stock" type="number" required />
                    </label>
                </div>

                <label>
                    Categoria
                    <select id="category_id" required></select>
                </label>

                <button type="submit">Cadastrar</button>
                <p id="msg" class="msg"></p>
            </form>
        </section>

        <section class="card">
            <div class="linha">
                <h2>Produtos</h2>
                <button id="btnAtualizar" type="button">Atualizar</button>
            </div>

            <p id="status" class="status"></p>
            <div id="lista" class="lista"></div>
        </section>
    </main>

    <footer class="rodape">
        <p>Aluno: Edimilson Teixeira | Curso Programação de Internet — Escola SENAI "Morvan Figueiredo"</p>
    </footer>
</body>

</html>
